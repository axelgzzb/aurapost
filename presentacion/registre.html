<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraPost - Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #e7f0ff, #f9f5ff);
      overflow-x: hidden;
    }
    .register-card {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
      padding: 2rem;
      max-width: 700px;
      margin: 5vh auto;
    }
    .logo-container img { width: 90px; height: auto; }
    .brand-text {
      font-weight: 600;
      font-size: 1.8rem;
      background: linear-gradient(90deg, #6c5ce7, #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-control {
      background: rgba(255,255,255,0.8);
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1rem;
    }
    .form-control:focus {
      box-shadow: 0 0 10px rgba(108,92,231,0.5);
      outline: none;
    }
    .btn-aura {
      background: linear-gradient(90deg, #6c5ce7, #a29bfe);
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      font-weight: 600;
      color: white;
      width: 100%;
    }
    .btn-aura:hover { opacity: 0.9; transform: scale(1.02); }
    .text-muted a { color: #6c5ce7; text-decoration: none; }
    .text-muted a:hover { text-decoration: underline; }
    .small-link { font-size: 0.85rem; display: block; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <div class="register-card">
    <div class="mb-4 text-center">
      <div class="logo-container"><img src="../src/logo.png" alt="Logo"></div>
      <div class="brand-text">AuraPost</div>
      <h5 class="text-secondary mt-2">Registro de Usuario</h5>
    </div>

    <form class="row g-3 needs-validation" action="../negocio/registre.php" method="POST" enctype="multipart/form-data" novalidate>
      <div class="col-md-6">
        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" class="form-control" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+" required>
        <div class="invalid-feedback">Introduce un nombre válido.</div>
      </div>

      <div class="col-md-6">
        <label class="form-label">Apellido</label>
        <input type="text" name="apellidos" class="form-control" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+" required>
        <div class="invalid-feedback">Introduce un apellido válido.</div>
      </div>

      <div class="col-md-6">
        <label class="form-label">Nombre de usuario</label>
        <div class="input-group">
          <span class="input-group-text">@</span>
          <input type="text" name="nombre_usuario" class="form-control" pattern="[A-Za-z0-9_]{3,20}" required>
          <div class="invalid-feedback">Alias no válido (3-20 caracteres, letras, números o _).</div>
        </div>
      </div>

      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
        <div class="invalid-feedback">Introduce un email válido.</div>
      </div>

      <div class="col-md-6">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <input type="password" name="contrasena" class="form-control" id="password" required minlength="8">
          <button type="button" class="btn" id="togglePassword">
            <i class="fa-solid fa-eye" style="color:#6c5ce7;"></i>
          </button>
        </div>
        <a href="https://axl.alwaysdata.net/Repte2/index.html" target="_blank" class="small-link">Crear contraseña segura</a>
        <div class="invalid-feedback">La contraseña debe tener al menos 8 caracteres.</div>
      </div>

      <div class="col-md-6">
        <label class="form-label">Pronombres (opcional)</label>
        <select class="form-control" name="pronombres">
          <option value="" selected hidden>Selecciona tu pronombre</option>
          <option>Él</option>
          <option>Ella</option>
          <option>Elle</option>
          <option>Prefiero no decirlo</option>
          <option>Otro</option>
        </select>
      </div>

      <div class="col-12">
        <label class="form-label">Foto de perfil (opcional)</label>
        <input type="file" name="foto_perfil" class="form-control">
      </div>

      <div class="col-12">
        <button class="btn btn-aura" type="submit">
          <i class="fas fa-paper-plane me-2"></i>Registrarse
        </button>
      </div>
    </form>

    <p class="text-muted mt-3 text-center">
      ¿Ya tienes cuenta? <a href="index.html">Iniciar sesión</a>
    </p>
  </div>

  <script>
    const form = document.querySelector('.needs-validation');
    const password = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');

    togglePassword.addEventListener('click', () => {
      const type = password.type === 'password' ? 'text' : 'password';
      password.type = type;
      togglePassword.innerHTML = type === 'password'
        ? '<i class="fa-solid fa-eye" style="color:#6c5ce7;"></i>'
        : '<i class="fa-solid fa-eye-slash" style="color:#6c5ce7;"></i>';
    });

    // Validación Bootstrap 5
    form.addEventListener('submit', e => {
      if (!form.checkValidity()) {
        e.preventDefault();
        e.stopPropagation();
      }
      form.classList.add('was-validated');
    });
  </script>
</body>
</html>
